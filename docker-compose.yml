services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  karpathy-wiki:
    build: .
    stdin_open: true
    tty: true
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    volumes:
      - ./raw:/app/raw
      - ./wiki:/app/wiki
      - ./memory:/app/memory
      - ./repos:/app/repos
    depends_on:
      - ollama

volumes:
  ollama_data:
