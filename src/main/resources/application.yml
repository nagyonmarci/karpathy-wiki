spring:
  application:
    name: karpathy-wiki
  main:
    web-application-type: none
  shell:
    interactive:
      enabled: true
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: 0.2

wiki:
  paths:
    raw: ./raw
    wiki: ./wiki
    skills: ./skills
    memory: ./memory
    imports: ./import
  ingest:
    auto-compile: true
    parallelism: -1   # -1 = auto (availableProcessors/4, max 4), 1 = sequential
  youtube:
    fetcher-url: ${YOUTUBE_FETCHER_URL:http://localhost:8000}
    directus-url: ${YOUTUBE_DIRECTUS_URL:http://localhost:8055}
    directus-token: ${YOUTUBE_DIRECTUS_TOKEN:}
    poll-interval-seconds: 10
    timeout-seconds: 300

logging:
  level:
    "[com.danvega.wiki]": DEBUG
