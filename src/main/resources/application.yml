spring:
  application:
    name: karpathy-wiki
  main:
    web-application-type: none
  shell:
    interactive:
      enabled: true
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: 0.2

wiki:
  paths:
    raw: ./raw
    wiki: ./wiki
    skills: ./skills
    memory: ./memory
  ingest:
    auto-compile: true

logging:
  level:
    com.danvega.wiki: DEBUG
